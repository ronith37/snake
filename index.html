<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="hud">
        <h1>Snake</h1>
        <div class="stats">
          <span>Score: <strong id="score">0</strong></span>
          <button id="restart" type="button">Restart</button>
        </div>
      </header>

      <section class="board-wrap" aria-label="Snake board">
        <div id="board" class="board" role="grid" aria-label="Snake game grid"></div>
      </section>

      <p id="status" class="status" aria-live="polite">Use arrow keys or WASD to start.</p>

      <section class="controls" aria-label="Touch controls">
        <button data-dir="up" type="button" aria-label="Move up">↑</button>
        <div class="controls-row">
          <button data-dir="left" type="button" aria-label="Move left">←</button>
          <button data-dir="down" type="button" aria-label="Move down">↓</button>
          <button data-dir="right" type="button" aria-label="Move right">→</button>
        </div>
      </section>
    </main>

    <script type="module" src="./src/game.js"></script>
  </body>
</html>
